<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="A modern, responsive calculator with advanced features">
    <meta name="theme-color" content="#1e1e2e">
    <title>Calculate Me! - Modern Calculator</title>
    <link href="style.css" rel="stylesheet" type="text/css"/>
    <link href="utils.css" rel="stylesheet" type="text/css"/>
</head>
<body>
    <div class="app-wrapper">
        <header class="app-header">
            <h1>Calculate Me!</h1>
            <button class="theme-toggle" aria-label="Toggle Dark/Light Mode" title="Toggle theme (T)">
                <span class="theme-icon">🌙</span>
            </button>
        </header>

        <main class="container">
            <section class="calculator">
                <div class="display-section">
                    <input class="display" type="text" placeholder="0" readonly />
                </div>

                <div class="history-section">
                    <button class="history-toggle" aria-label="Toggle History">History ↓</button>
                    <div class="history-list" id="historyList"></div>
                </div>

                <div class="button-grid">
                    <button class="btn btn-function" data-action="clear">C</button>
                    <button class="btn btn-function" data-action="delete">⌫</button>
                    <button class="btn btn-function" data-action="percent">%</button>
                    <button class="btn btn-operator" data-operator="/">÷</button>

                    <button class="btn" data-value="7">7</button>
                    <button class="btn" data-value="8">8</button>
                    <button class="btn" data-value="9">9</button>
                    <button class="btn btn-operator" data-operator="*">×</button>

                    <button class="btn" data-value="4">4</button>
                    <button class="btn" data-value="5">5</button>
                    <button class="btn" data-value="6">6</button>
                    <button class="btn btn-operator" data-operator="-">−</button>

                    <button class="btn" data-value="1">1</button>
                    <button class="btn" data-value="2">2</button>
                    <button class="btn" data-value="3">3</button>
                    <button class="btn btn-operator" data-operator="+">+</button>

                    <button class="btn btn-decimal" data-value=".">.</button>
                    <button class="btn btn-zero" data-value="0">0</button>
                    <button class="btn btn-equals" data-action="equals">=</button>
                </div>
            </section>

            <section class="info-section">
                <h3>Keyboard Shortcuts</h3>
                <ul>
                    <li><kbd>Enter</kbd> or <kbd>=</kbd> - Calculate</li>
                    <li><kbd>Backspace</kbd> - Delete last digit</li>
                    <li><kbd>C</kbd> - Clear all</li>
                    <li><kbd>T</kbd> - Toggle theme</li>
                </ul>
            </section>
        </main>

        <footer>
            <p>Made with ❤️ for fast calculations</p>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
